<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
  <meta name="theme-color" content="#0E0E0E">
  <title>Cardiomed — Centro Médico Integral | Campana, Buenos Aires</title>
  <meta name="description" content="Centro médico en Campana. Hospital de Día con +15 especialistas. Turnos online 24hs.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
/* ── TOKENS ───────────────────────────────────────────────── */
:root {
  --bone:    #F9F6F1;
  --bone2:   #F0EDE7;
  --bone3:   #E2DDD6;
  --paper:   #FDFCFA;
  --ink:     #0E0E0E;
  --ink2:    #1A1A1A;
  --mid:     #4A4A4A;
  --muted:   #888880;
  --ghost:   #BEBAB2;
  --red:     #018e96;
  --red2:    #006065;
  --white:   #FFFFFF;
  --wa:      #25D366;
  --serif:   'Instrument Serif', Georgia, serif;
  --mono:    'IBM Plex Mono', 'Courier New', monospace;
  --sans:    'Instrument Sans', system-ui, sans-serif;
  --max:     1280px;
  --nav-h:   60px;
  --pad:     clamp(20px, 4vw, 48px);
  --ease:    cubic-bezier(0.16, 1, 0.3, 1);
  --fast: 240ms;
  --base: 480ms;

}

/* ── RESET ────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body { font-family: var(--sans); color: var(--mid); background: var(--bone); min-height: 100dvh; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
a { text-decoration: none; color: inherit; }
button { cursor: pointer; border: none; background: none; padding: 0; font-family: var(--sans); }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--bone2); }
::-webkit-scrollbar-thumb { background: var(--red); }

/* ── REVEAL ANIMATIONS ────────────────────────────────────── */
@keyframes slideUp   { from { opacity:0; transform:translateY(22px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn    { from { opacity:0; } to { opacity:1; } }
@keyframes wa-ring   { 0%,100% { box-shadow:0 0 0 0 rgba(37,211,102,.5); } 70% { box-shadow:0 0 0 9px rgba(37,211,102,0); } }

/* Scroll-triggered reveal — JS adds .in */
.rv  { opacity:0; transform:translateY(18px);  transition: opacity .65s var(--ease), transform .65s var(--ease); }
.rvl { opacity:0; transform:translateX(-18px); transition: opacity .65s var(--ease), transform .65s var(--ease); }
.rvr { opacity:0; transform:translateX(18px);  transition: opacity .65s var(--ease), transform .65s var(--ease); }
.rv.in, .rvl.in, .rvr.in { opacity:1; transform:translate(0,0); }

/* Hero CSS animations (no JS needed) */
.ha1 { animation: slideUp .7s var(--ease) 0.00s both; }
.ha2 { animation: slideUp .7s var(--ease) 0.08s both; }
.ha3 { animation: slideUp .7s var(--ease) 0.16s both; }
.ha4 { animation: slideUp .7s var(--ease) 0.24s both; }
.ha5 { animation: slideUp .7s var(--ease) 0.32s both; }
.ha6 { animation: slideUp .7s var(--ease) 0.40s both; }

/* ── LAYOUT HELPERS ───────────────────────────────────────── */
.wrap { max-width: var(--max); margin: 0 auto; padding: 0 var(--pad); }
.sec  { padding: 88px 0; }
.sec--bone2 { background: var(--bone2); }
.sec--paper { background: var(--paper); }
@media(max-width:768px){ .sec { padding: 60px 0; } }

/* ── NAVBAR ───────────────────────────────────────────────── */
.nav { position:fixed; top:0; left:0; right:0; z-index:500; height:var(--nav-h); display:flex; align-items:center; background:rgba(249,246,241,.97); backdrop-filter:blur(12px); border-bottom:1px solid transparent; transition:border-color var(--base) var(--ease); }
.nav.is-scrolled { border-bottom-color:var(--bone3); }
.nav__wrap { width:100%; max-width:var(--max); margin:0 auto; padding:0 var(--pad); display:flex; align-items:center; justify-content:space-between; gap:16px; }
.nav__logo { display:flex; align-items:center; gap:12px; flex-shrink:0; background:none; border:none; cursor:pointer; }
.nav__mark { width:32px; height:32px; background:var(--ink2); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.nav__mark svg { color:white; }
.nav__name { font-family:var(--serif); font-size:1rem; color:var(--ink2); letter-spacing:.01em; line-height:1.1; display:block; }
.nav__sub  { font-family:var(--mono); font-size:.5rem; letter-spacing:.18em; text-transform:uppercase; color:var(--ghost); line-height:1; display:block; }
.nav__links { display:flex; align-items:center; }
.nav__link { font-size:.82rem; font-weight:400; color:var(--muted); padding:6px 12px; border-bottom:1.5px solid transparent; transition:color var(--fast), border-color var(--fast); background:none; border-left:none; border-right:none; border-top:none; cursor:pointer; font-family:var(--sans); }
.nav__link:hover { color:var(--ink2); }
.nav__link.active { color:var(--ink2); font-weight:600; border-bottom-color:var(--red); }
.nav__actions { display:flex; align-items:center; gap:8px; }
.nav__burger { display:none; width:36px; height:36px; align-items:center; justify-content:center; border:1px solid var(--bone3)!important; color:var(--ink2); }
.nav__drawer { position:fixed; top:var(--nav-h); left:0; right:0; bottom:0; background:var(--bone); z-index:499; padding:24px var(--pad) 48px; display:flex; flex-direction:column; overflow-y:auto; }
.nav__drawer-link { display:flex; align-items:center; justify-content:space-between; padding:16px 0; border:none; border-bottom:1px solid var(--bone3); font-size:1rem; color:var(--ink2); font-family:var(--sans); text-align:left; cursor:pointer; background:none; transition:color var(--fast); }
.nav__drawer-link:hover, .nav__drawer-link.active { color:var(--red); }
.nav__drawer-actions { display:flex; flex-direction:column; gap:12px; margin-top:32px; }

/* ── BUTTONS ──────────────────────────────────────────────── */
.btn { display:inline-flex; align-items:center; gap:7px; font-family:var(--sans); font-weight:500; white-space:nowrap; text-decoration:none; letter-spacing:.01em; cursor:pointer; border:1.5px solid transparent; transition:background var(--fast), color var(--fast), border-color var(--fast), opacity var(--fast); }
.btn--sm { font-size:.72rem; padding:8px 16px; }
.btn--md { font-size:.82rem; padding:10px 22px; }
.btn--lg { font-size:.92rem; padding:13px 30px; }
.btn--full { width:100%; justify-content:center; }
.btn--red     { background:var(--red);   color:var(--white); border-color:var(--red); }
.btn--red:hover { background:var(--red2); border-color:var(--red2); }
.btn--ink     { background:var(--ink2);  color:var(--white); border-color:var(--ink2); }
.btn--ink:hover { opacity:.82; }
.btn--ghost   { background:transparent; color:var(--mid);   border-color:var(--bone3); }
.btn--ghost:hover { border-color:var(--ink2); color:var(--ink2); }
.btn--ghostw  { background:transparent; color:rgba(255,255,255,.65); border-color:rgba(255,255,255,.2); }
.btn--ghostw:hover { color:var(--white); border-color:rgba(255,255,255,.55); }
.btn--wa      { background:var(--wa);   color:var(--white); border-color:var(--wa); }
.btn--wa:hover { filter:brightness(1.07); }

/* ── WA FLOAT ─────────────────────────────────────────────── */
.wa-float { position:fixed; bottom:24px; right:24px; z-index:900; width:48px; height:48px; background:var(--wa); color:var(--white); display:flex; align-items:center; justify-content:center; text-decoration:none; animation:wa-ring 3s ease-in-out infinite; transition:transform var(--fast); }
.wa-float:hover { transform:scale(1.07); }

/* ── HERO ─────────────────────────────────────────────────── */
.hero { min-height:calc(100dvh - var(--nav-h) - 52px); background:var(--ink2); margin-top:var(--nav-h); display:flex; flex-direction:column; justify-content:center; position:relative; overflow:hidden; }
.hero::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--red); }
.hero__wm { position:absolute; right:-.05em; bottom:-.15em; font-family:var(--serif); font-size:clamp(18rem,35vw,42rem); font-weight:400; line-height:1; color:rgba(255,255,255,.025); pointer-events:none; user-select:none; letter-spacing:-.04em; }
.hero__inner { max-width:var(--max); margin:0 auto; padding:10px var(--pad) 60px; width:100%; display:grid; grid-template-columns:7fr 5fr; gap:64px; align-items:center; position:relative; z-index:1; }
.hero__eye { font-family:var(--mono); font-size:.65rem; letter-spacing:.22em; text-transform:uppercase; color:var(--red); margin-bottom:28px; display:flex; align-items:center; gap:16px; }
.hero__eye::before { content:''; display:block; width:28px; height:1px; background:var(--red); flex-shrink:0; }
.hero__h1 { font-family:var(--serif); font-size:clamp(4rem,9vw,8.5rem); font-weight:400; line-height:.92; letter-spacing:-.035em; color:var(--white); margin-bottom:28px; }
.hero__h1 em { font-style:italic; color:rgba(255,255,255,.35); }
.hero__body { font-size:.95rem; line-height:1.85; color:rgba(255,255,255,.38); max-width:400px; margin-bottom:36px; }
.hero__btns { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:44px; }
.hero__meta { display:flex; flex-wrap:wrap; gap:24px; padding-top:36px; border-top:1px solid rgba(255,255,255,.06); }
.hero__mi { display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:.62rem; color:rgba(255,255,255,.22); letter-spacing:.04em; }
.hero__mi svg { opacity:.5; }
.hero__panel { border:1px solid rgba(255,255,255,.06); padding:36px; align-self:center; }
.hero__plbl { font-family:var(--mono); font-size:.62rem; letter-spacing:.2em; text-transform:uppercase; color:rgba(255,255,255,.18); margin-bottom:28px; }
.hero__sg { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:rgba(255,255,255,.05); margin-bottom:1px; }
.hero__sc { background:var(--ink2); padding:22px 18px; }
.hero__sn { font-family:var(--serif); font-size:2.6rem; color:var(--white); line-height:1; letter-spacing:-.03em; }
.hero__sl { font-family:var(--mono); font-size:.62rem; color:rgba(255,255,255,.24); margin-top:8px; letter-spacing:.04em; line-height:1.4; }
.hero__status { background:var(--ink2); padding:16px 18px; display:flex; align-items:center; gap:10px; }
.hero__dot { width:6px; height:6px; border-radius:50%; background:#4ade80; flex-shrink:0; }
.hero__stxt { font-family:var(--mono); font-size:.62rem; color:rgba(255,255,255,.28); letter-spacing:.04em; }

/* ── TRUST BAR ────────────────────────────────────────────── */
.trust { background:var(--ink); border-top:1px solid rgba(255,255,255,.04); border-bottom:1px solid rgba(255,255,255,.04); }
.trust__row { max-width:var(--max); margin:0 auto; padding:0 var(--pad); display:flex; flex-wrap:wrap; justify-content:center; }
.trust__item { display:flex; align-items:center; gap:8px; padding:14px 24px; font-family:var(--mono); font-size:.65rem; color:rgba(255,255,255,.3); letter-spacing:.04em; border-right:1px solid rgba(255,255,255,.05); }
.trust__item:last-child { border-right:none; }
.trust__item svg { color:var(--red); opacity:.8; }

/* ── EYEBROW + HEADINGS ───────────────────────────────────── */
.eye { font-family:var(--mono); font-size:.65rem; letter-spacing:.18em; text-transform:uppercase; color:var(--red); margin-bottom:14px; display:flex; align-items:center; gap:12px; }
.eye::before { content:''; display:block; width:18px; height:1px; background:var(--red); flex-shrink:0; }
.eye--w { color:rgba(255,255,255,.4); }
.eye--w::before { background:rgba(255,255,255,.3); }
.eye--c { justify-content:center; }
.eye--c::before { display:none; }

.hdg { font-family:var(--serif); font-size:clamp(1.8rem,4vw,3rem); font-weight:400; line-height:1.08; letter-spacing:-.02em; color:var(--ink2); }
.hdg--w { color:var(--white); }
.hdg--sm { font-size:clamp(1.3rem,2.5vw,1.9rem); }

.body-copy { font-size:.95rem; line-height:1.82; color:var(--mid); }

/* ── SPLIT ────────────────────────────────────────────────── */
.split { display:grid; grid-template-columns:1fr 1fr; gap:72px; align-items:start; }
.split--7-5 { grid-template-columns:7fr 5fr; }

/* ── FEATURE LIST ─────────────────────────────────────────── */
.feat { display:flex; flex-direction:column; margin-top:28px; }
.feat__row { display:flex; gap:18px; padding:18px 0; border-bottom:1px solid var(--bone3); align-items:flex-start; }
.feat__row:last-child { border-bottom:none; }
.feat__n { font-family:var(--mono); font-size:.62rem; font-weight:700; color:var(--red); width:22px; flex-shrink:0; padding-top:2px; letter-spacing:.06em; }
.feat__t { font-size:.9rem; font-weight:500; color:var(--ink2); margin-bottom:2px; }
.feat__d { font-family:var(--mono); font-size:.65rem; color:var(--muted); line-height:1.6; letter-spacing:.03em; }

/* ── TECH GRID ────────────────────────────────────────────── */
.tech { border-top:2px solid var(--red); padding-top:28px; }
.tech__lbl { font-family:var(--mono); font-size:.62rem; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:22px; }
.tech__row { display:flex; gap:18px; padding-bottom:18px; margin-bottom:18px; border-bottom:1px solid var(--bone3); align-items:flex-start; }
.tech__row:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
.tech__n { font-family:var(--mono); font-size:.62rem; font-weight:700; color:var(--red); width:22px; flex-shrink:0; padding-top:1px; }
.tech__t { font-weight:500; font-size:.85rem; color:var(--ink2); margin-bottom:2px; }
.tech__d { font-family:var(--mono); font-size:.62rem; color:var(--muted); line-height:1.55; letter-spacing:.03em; }

/* ── SERVICE TILES (invert on hover) ─────────────────────── */
.svc-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--bone3); }
.svc-tile { background:var(--paper); padding:28px 22px; cursor:pointer; position:relative; overflow:hidden; }
.svc-tile::after { content:''; position:absolute; inset:0; background:var(--ink2); transform:scaleY(0); transform-origin:bottom; transition:transform .28s var(--ease); z-index:0; }
.svc-tile:hover::after { transform:scaleY(1); }
.svc-tile > * { position:relative; z-index:1; transition:color var(--fast); }
.svc-tile:hover .svc__title { color:var(--white); }
.svc-tile:hover .svc__desc  { color:rgba(255,255,255,.42); }
.svc-tile:hover .svc__ico   { color:var(--red); }
.svc-tile:hover .svc__cta   { color:rgba(255,255,255,.45); }
.svc__flag { position:absolute; top:14px; right:14px; z-index:2; font-family:var(--mono); font-size:.55rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--red); border:1px solid var(--red); padding:2px 7px; }
.svc__ico   { color:var(--muted); margin-bottom:14px; }
.svc__title { font-family:var(--serif); font-size:1.2rem; font-weight:400; color:var(--ink2); margin-bottom:7px; line-height:1.2; }
.svc__desc  { font-size:.8rem; color:var(--mid); line-height:1.65; }
.svc__cta   { display:inline-flex; align-items:center; gap:5px; margin-top:16px; font-family:var(--mono); font-size:.62rem; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; }

/* ── NOVEDADES ────────────────────────────────────────────── */
.nov-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--bone3); }
.nov-tile { background:var(--paper); padding:28px 22px; transition:background var(--fast); }
.nov-tile:hover { background:var(--bone2); }
.nov__tag  { font-family:var(--mono); font-size:.62rem; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--red); display:block; margin-bottom:14px; }
.nov__h    { font-family:var(--serif); font-size:1.5rem; font-weight:400; color:var(--ink2); margin-bottom:10px; line-height:1.15; }
.nov__d    { font-size:.8rem; color:var(--mid); line-height:1.68; margin-bottom:20px; }
.nov__who  { display:flex; align-items:center; gap:10px; padding-top:16px; border-top:1px solid var(--bone3); }
.nov__av   { width:26px; height:26px; background:var(--ink2); display:flex; align-items:center; justify-content:center; font-family:var(--serif); font-size:.75rem; color:var(--white); flex-shrink:0; }
.nov__nm   { font-family:var(--mono); font-size:.62rem; color:var(--ink2); letter-spacing:.04em; }

/* ── CTA BAND ─────────────────────────────────────────────── */
.cta { background:var(--ink2); padding:80px var(--pad); position:relative; overflow:hidden; text-align:center; }
.cta::before { content:'CM'; position:absolute; right:-.05em; bottom:-.3em; font-family:var(--serif); font-size:22rem; font-weight:400; line-height:1; color:rgba(255,255,255,.02); pointer-events:none; user-select:none; letter-spacing:-.05em; }
.cta__inner { max-width:540px; margin:0 auto; position:relative; z-index:1; }
.cta__h { font-family:var(--serif); font-size:clamp(2rem,4vw,3rem); font-weight:400; line-height:1.08; color:var(--white); margin:12px 0 14px; letter-spacing:-.02em; }
.cta__sub { font-size:.9rem; color:rgba(255,255,255,.35); line-height:1.78; margin-bottom:36px; }
.cta__btns { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }

/* ── PAGE HEADER ──────────────────────────────────────────── */
.ph { background:var(--ink2); margin-top:var(--nav-h); padding:60px var(--pad) 72px; }
.ph__wrap { max-width:var(--max); margin:0 auto; }
.bc { display:flex; align-items:center; gap:8px; margin-bottom:20px; }
.bc__btn { font-family:var(--mono); font-size:.62rem; color:rgba(255,255,255,.28); background:none; border:none; cursor:pointer; padding:0; transition:color var(--fast); }
.bc__btn:hover { color:rgba(255,255,255,.6); }
.bc__sep { font-family:var(--mono); font-size:.62rem; color:rgba(255,255,255,.15); }
.bc__cur { font-family:var(--mono); font-size:.62rem; color:rgba(255,255,255,.42); }

/* ── CIRCUIT CARDS ────────────────────────────────────────── */
.crc-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--bone3); margin-bottom:72px; }
.crc { background:var(--paper); padding:36px 28px; position:relative; }
.crc--best { background:var(--ink2); }
.crc__accent { position:absolute; top:0; left:0; right:0; height:2px; background:var(--red); }
.crc__time { font-family:var(--mono); font-size:.62rem; color:var(--muted); display:flex; align-items:center; gap:6px; margin-bottom:14px; letter-spacing:.04em; }
.crc--best .crc__time { color:rgba(255,255,255,.25); }
.crc__rec  { font-family:var(--mono); font-size:.62rem; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--red); display:block; margin-bottom:14px; }
.crc__name { font-family:var(--serif); font-size:clamp(1.4rem,2.5vw,1.8rem); font-weight:400; color:var(--ink2); margin-bottom:6px; line-height:1.1; }
.crc--best .crc__name { color:var(--white); }
.crc__sub  { font-family:var(--mono); font-size:.62rem; color:var(--muted); margin-bottom:22px; letter-spacing:.04em; }
.crc--best .crc__sub  { color:rgba(255,255,255,.25); }
.crc__list { list-style:none; display:flex; flex-direction:column; gap:10px; margin-bottom:28px; }
.crc__item { display:flex; align-items:flex-start; gap:8px; font-size:.8rem; color:var(--mid); line-height:1.4; }
.crc--best .crc__item { color:rgba(255,255,255,.45); }
.crc__item svg { flex-shrink:0; margin-top:2px; color:var(--red); opacity:.75; }

/* ── STUDIES ──────────────────────────────────────────────── */
.std-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--bone3); margin-bottom:40px; }
.std { background:var(--paper); padding:22px 18px; transition:background var(--fast); }
.std:hover { background:var(--bone2); }
.std__n { font-weight:500; font-size:.9rem; color:var(--ink2); margin-bottom:4px; line-height:1.3; }
.std__w { font-family:var(--mono); font-size:.62rem; color:var(--muted); line-height:1.4; letter-spacing:.03em; }

/* ── PROFESSIONALS ────────────────────────────────────────── */

.prof-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--bone3); margin-bottom:36px; }

/* ── PROFESSIONALS ────────────────────────────────────────── */
.prof-grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:1px;
  background:var(--bone3);
  margin-bottom:36px;
}

.prof {
  background:var(--paper);
  padding:22px 18px;
  display:flex;
  flex-direction:column;
  transition:
    background var(--fast),
    transform var(--base) var(--ease),
    box-shadow var(--base) var(--ease);
  overflow:hidden;
}

.prof:hover {
  background:var(--bone2);
  transform:translateY(-2px);
}

.prof__av {
  width:32px;
  height:32px;
  background:var(--ink2);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:var(--serif);
  font-size:.9rem;
  color:var(--white);
  flex-shrink:0;
  margin-bottom:12px;
}

.prof__spec {
  font-family:var(--mono);
  font-size:.6rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--red);
  margin-bottom:4px;
  opacity:.85;
  transition:opacity var(--base) var(--ease), transform var(--base) var(--ease);
}

.prof__name {
  font-weight:500;
  font-size:.82rem;
  color:var(--ink2);
  line-height:1.35;
  transition:transform var(--base) var(--ease);
}

.prof__cta {
  display:inline-flex;
  align-items:center;
  gap:5px;
  width:fit-content;
  margin-top:0;
  padding:5px 10px;
  font-family:var(--mono);
  font-size:.6rem;
  background:var(--red);
  color:var(--white);
  border:none;
  cursor:pointer;
  letter-spacing:.06em;
  text-transform:uppercase;

  opacity:0;
  transform:translateY(10px);
  max-height:0;
  overflow:hidden;
  pointer-events:none;

  transition:
    opacity var(--base) var(--ease),
    transform var(--base) var(--ease),
    max-height var(--base) var(--ease),
    margin-top var(--base) var(--ease),
    background var(--fast);
}

.prof__cta:hover {
  background:var(--red2);
}

.prof:hover .prof__spec {
  opacity:1;
  transform:translateY(-1px);
}

.prof:hover .prof__name {
  transform:translateY(-1px);
}

.prof:hover .prof__cta {
  opacity:1;
  transform:translateY(0);
  max-height:40px;
  margin-top:10px;
  pointer-events:auto;
}

/* ── COVERAGES ────────────────────────────────────────────── */
.cov-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--bone3); margin-bottom:22px; }
.cov  { background:var(--paper); padding:12px 14px; font-family:var(--mono); font-size:.65rem; color:var(--muted); letter-spacing:.03em; transition:all var(--fast); display:flex; align-items:center; gap:6px; }
.cov:hover { background:var(--bone2); color:var(--ink2); }
.cov__chk { display:none; color:var(--red); flex-shrink:0; }
.cov:hover .cov__chk { display:block; }

/* ── FILTERS + SEARCH ─────────────────────────────────────── */
.filters { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:36px; padding-bottom:28px; border-bottom:1px solid var(--bone3); }
.fpill { font-family:var(--mono); font-size:.62rem; padding:7px 14px; border:1px solid var(--bone3); color:var(--muted); background:transparent; transition:all var(--fast); cursor:pointer; letter-spacing:.04em; }
.fpill:hover { border-color:var(--ink2); color:var(--ink2); }
.fpill.on { background:var(--ink2); color:var(--white); border-color:var(--ink2); }
.srch { position:relative; flex:1 1 240px; max-width:300px; }
.srch__ico { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--ghost); pointer-events:none; }
.srch__inp { width:100%; padding:9px 12px 9px 34px; border:1px solid var(--bone3); background:var(--paper); font-family:var(--mono); font-size:.65rem; color:var(--ink2); outline:none; transition:border-color var(--fast); letter-spacing:.04em; }
.srch__inp:focus { border-color:var(--red); }
.srch__inp::placeholder { color:var(--ghost); }

/* ── LOCATION ─────────────────────────────────────────────── */
.loc { display:flex; flex-direction:column; align-items:center; justify-content:center; background:var(--bone2); border:1px solid var(--bone3); height:380px; text-align:center; padding:32px; text-decoration:none; transition:border-color var(--base) var(--ease); cursor:pointer; }
.loc:hover { border-color:var(--red); }
.loc__pin { width:42px; height:42px; border:1px solid var(--bone3); display:flex; align-items:center; justify-content:center; margin:0 auto 18px; color:var(--red); transition:border-color var(--fast); }
.loc:hover .loc__pin { border-color:var(--red); }

/* ── TURNOS ───────────────────────────────────────────────── */
.trn-grid { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--bone3); margin-bottom:24px; }
.trn { background:var(--paper); padding:28px 24px; }

/* ── NOTE ─────────────────────────────────────────────────── */
.note { display:flex; gap:10px; padding:14px 18px; background:var(--bone2); border-left:2px solid var(--red); font-family:var(--mono); font-size:.62rem; color:var(--muted); line-height:1.6; }

/* ── SEC-HEAD ─────────────────────────────────────────────── */
.sec-head { display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:20px; margin-bottom:40px; }

/* ── FOOTER ───────────────────────────────────────────────── */
.footer { background:var(--ink2); color:rgba(255,255,255,.32); }
.footer__grid { max-width:var(--max); margin:0 auto; padding:60px var(--pad) 28px; display:grid; grid-template-columns:1.4fr 1fr 1fr 1fr; gap:44px; }
.footer__mark { width:26px; height:26px; background:var(--red); display:flex; align-items:center; justify-content:center; }
.footer__logo { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.footer__brand { font-family:var(--serif); color:rgba(255,255,255,.75); font-size:.95rem; }
.footer__desc { font-family:var(--mono); font-size:.62rem; line-height:1.72; max-width:180px; letter-spacing:.03em; }
.footer__col-h { font-family:var(--mono); font-size:.6rem; font-weight:600; letter-spacing:.18em; text-transform:uppercase; color:rgba(255,255,255,.18); margin-bottom:18px; }
.footer__lnk { display:block; margin-bottom:9px; font-family:var(--mono); font-size:.65rem; color:rgba(255,255,255,.32); text-decoration:none; border:none; background:none; padding:0; cursor:pointer; text-align:left; letter-spacing:.03em; transition:color var(--fast); }

.footer__lnk.hi { color:rgba(255,255,255,.68); }
.footer__bar { max-width:var(--max); margin:0 auto; padding:18px var(--pad) 26px; border-top:1px solid rgba(255,255,255,.05); display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; font-family:var(--mono); font-size:.6rem; color:rgba(255,255,255,.16); letter-spacing:.04em; }

/* ─── HOOKS ──────────────────────────────────────────────── */
function useScrollY() {
  const [y, setY] = useState(0);
  useEffect(() => {
    const fn = () => setY(window.scrollY);
    window.addEventListener('scroll', fn, { passive: true });
    return () => window.removeEventListener('scroll', fn);
  }, []);
  return y;
}

// FIX: queries .rv .rvl .rvr — matching the CSS
function useReveal() {
  useEffect(() => {
    const run = () => {
      const els = document.querySelectorAll('.rv, .rvl, .rvr');
      if (!els.length) return;
      const obs = new IntersectionObserver(
        entries => entries.forEach(e => {
          if (e.isIntersecting) { e.target.classList.add('in'); obs.unobserve(e.target); }
        }),
        { threshold: 0.07, rootMargin: '0px 0px -28px 0px' }
      );
      els.forEach(el => obs.observe(el));
      return () => obs.disconnect();
    };
    const cleanup = run();
    return cleanup;
  });
}

}

/* ─── APP ────────────────────────────────────────────────── */
const PAGES = {
  inicio:        PageInicio,
  circuitos:     PageCircuitos,
  estudios:      PageEstudios,
  profesionales: PageProfesionales,
  coberturas:    PageCoberturas,
  ubicacion:     PageUbicacion,
  turnos:        PageTurnos,
};

function App() {
  const [page, setPage] = useState('inicio');
  const go = useCallback(id => {
    setPage(id);
    requestAnimationFrame(() => window.scrollTo({ top: 0, behavior: 'instant' }));
  }, []);
  const Page = PAGES[page] || PageInicio;
  return (
    <>
      <Navbar page={page} go={go} />
      <main style={{ minHeight: '100dvh' }}>
        <Page go={go} />
      </main>
      <Footer go={go} />
      <WAFloat />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
